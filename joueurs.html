<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FC KURO - Joueurs</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050008;
    color:white;
    min-height:100vh;
}

/* HEADER */

header{
    width:100%;
    height:90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 55px;
    background:rgba(0,0,0,.85);
    border-bottom:1px solid rgba(153,0,255,.4);
    box-shadow:0 0 25px rgba(123,0,255,.25);
}

.logo{
    font-size:26px;
    font-weight:900;
    letter-spacing:3px;
    color:white;
    text-decoration:none;
    text-shadow:0 0 15px #8a00ff;
}

nav{
    display:flex;
    gap:28px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:13px;
    font-weight:bold;
    letter-spacing:1px;
    transition:.3s;
}

nav a:hover,
nav a.active{
    color:#b56cff;
    text-shadow:0 0 15px #9b00ff;
}

.page{
    padding:60px 8%;
    min-height:calc(100vh - 90px);
    background:
    radial-gradient(circle at top right, rgba(120,0,255,.35), transparent 35%),
    radial-gradient(circle at bottom left, rgba(0,255,255,.12), transparent 35%),
    #050008;
}

.title{
    text-align:center;
    font-size:55px;
    letter-spacing:8px;
    text-shadow:
    0 0 15px #7b00ff,
    0 0 45px #7b00ff;
}

.subtitle{
    text-align:center;
    margin-top:15px;
    color:#c79aff;
    letter-spacing:5px;
    font-size:14px;
}

.categories{
    margin-top:60px;
    display:flex;
    flex-direction:column;
    gap:25px;
}

.category{
    border:1px solid rgba(154,0,255,.5);
    background:rgba(0,0,0,.45);
    box-shadow:0 0 25px rgba(123,0,255,.18);
    border-radius:12px;
    overflow:hidden;
}

.category-title{
    width:100%;
    padding:22px 30px;
    background:linear-gradient(90deg, rgba(123,0,255,.65), rgba(0,0,0,.35));
    color:white;
    font-size:22px;
    font-weight:900;
    letter-spacing:4px;
    cursor:pointer;
    border:none;
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.category-title span{
    color:#c79aff;
}

/* MODIFICATION */
.category-content{
    display:none;
    padding:30px;
}

.category.open .category-content{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
}

.player-card{
    width:240px;
    background:rgba(0,0,0,.65);
    border:1px solid rgba(0,255,255,.35);
    border-radius:12px;
    overflow:hidden;
    transition:.3s;
    box-shadow:0 0 20px rgba(0,255,255,.12);
}

.player-card:hover{
    transform:translateY(-8px);
    box-shadow:
    0 0 25px rgba(0,255,255,.35),
    0 0 40px rgba(123,0,255,.25);
}

.player-card img{
    width:100%;
    height:340px;
    object-fit:cover;
    object-position:top;
    cursor:pointer;
    display:block;
}

.player-info{
    padding:18px;
    background:#000;
    text-align:center;
}

.player-info h3{
    font-size:18px;
    letter-spacing:2px;
}

.player-info p{
    margin-top:8px;
    color:#c79aff;
    font-size:13px;
}

.like-box{
    margin-top:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.like-btn{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#7200ff;
    color:white;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 0 18px #7200ff;
}

.like-btn:hover:not(:disabled){
    background:#a100ff;
    transform:scale(1.05);
}

.like-btn.liked{
    background:#00bcd4;
    box-shadow:0 0 18px #00eaff;
}

.like-btn:disabled{
    opacity:.55;
    cursor:not-allowed;
}

.likes{
    color:#00eaff;
    font-weight:bold;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal.open{
    display:flex;
}

.modal img{
    max-width:90%;
    max-height:90%;
}

.close{
    position:absolute;
    top:25px;
    right:40px;
    font-size:45px;
    cursor:pointer;
}

@media(max-width:800px){

    header{
        padding:0 20px;
    }

    nav{
        display:none;
    }

    .category.open .category-content{
        justify-content:center;
    }

}
</style>
</head>

<body>

<header>

<a href="index.html" class="logo">FC KURO</a>

<nav>
<a href="index.html">ACCUEIL</a>
<a href="equipe.html">ÉQUIPE</a>
<a href="joueurs.html" class="active">JOUEURS</a>
<a href="classement.html">CLASSEMENT</a>
<a href="club.html">CLUB</a>
</nav>

</header>

<section class="page">

<h1 class="title">JOUEURS</h1>
<p class="subtitle">FICHES OFFICIELLES FC KURO</p>

<div class="categories">

<div class="category">
<button class="category-title">
BU
<span>+</span>
</button>

<div class="category-content"></div>

</div>

<div class="category open">

<button class="category-title">

MILIEU

<span>-</span>

</button>

<div class="category-content">

    <!-- LIAZ LEKA -->
<div class="player-card">

    <img
        src="liaz-leka.png"
        alt="Liaz Leka"
        onclick="openModal(this.src)"
    >

    <div class="player-info">

        <h3>LIAZ LEKA</h3>

        <p>MC - Milieu Central</p>

        <div class="like-box">

            <button
                class="like-btn"
                data-player="liazLeka"
                onclick="likePlayer(this, 'liazLeka')"
                disabled
            >
                CONNEXION...
            </button>

            <span
                class="likes"
                id="liazLeka"
            >
                0
            </span>

        </div>

    </div>

</div>

<!-- KORO SEIRO -->
<div class="player-card">

    <img
        src="koro-seiro.png"
        alt="Koro Seiro"
        onclick="openModal(this.src)"
    >

    <div class="player-info">

        <h3>KORO SEIRO</h3>

        <p>MC - Milieu</p>

        <div class="like-box">

            <button
                class="like-btn"
                data-player="koroSeiro"
                onclick="likePlayer(this, 'koroSeiro')"
                disabled
            >
                CONNEXION...
            </button>

            <span
                class="likes"
                id="koroSeiro"
            >
                0
            </span>

        </div>

    </div>

</div>

</div>
</div>

<div class="category">

    <button class="category-title">

        DÉFENSEUR

        <span>+</span>

    </button>

    <div class="category-content"></div>

</div>

<div class="category">

    <button class="category-title">

        GARDIEN

        <span>+</span>

    </button>

    <div class="category-content"></div>

</div>

</div>

</section>

<div class="modal" id="modal">

    <span class="close" onclick="closeModal()">
        ×
    </span>

    <img
        id="modalImg"
        src=""
        alt="Fiche du joueur"
    >

</div>

    <script type="module">

import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue,
    set,
    remove
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

import {
    getAuth,
    signInAnonymously,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";


const firebaseConfig = {
    apiKey: "AIzaSyCCXkp9d-FYi94-OYQ1rAJIlAA_TyfVc-k",
    authDomain: "fc-kuro.firebaseapp.com",
    databaseURL: "https://fc-kuro-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "fc-kuro",
    storageBucket: "fc-kuro.firebasestorage.app",
    messagingSenderId: "420379848342",
    appId: "1:420379848342:web:c5c5f66ad096cdd827dcb7",
    measurementId: "G-Y2T0Q3BR6E"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);
const auth = getAuth(app);

const players = [
    "liazLeka",
    "koroSeiro"
];

let currentUser = null;
let likesInitialized = false;


/* ==================================
   ÉTAT DES BOUTONS AU CHARGEMENT
================================== */

document
    .querySelectorAll(".like-btn")
    .forEach((button) => {

        button.disabled = true;
        button.textContent = "CONNEXION...";

    });


/* ==================================
   AUTHENTIFICATION ANONYME
================================== */

onAuthStateChanged(auth, (user) => {

    if (!user) {

        currentUser = null;

        console.log(
            "Aucun utilisateur connecté pour le moment."
        );

        return;

    }

    currentUser = user;

    console.log(
        "Utilisateur connecté anonymement :",
        currentUser.uid
    );

    if (!likesInitialized) {

        initializeLikes();

        likesInitialized = true;

    }

});


signInAnonymously(auth)
    .then((userCredential) => {

        console.log(
            "Connexion anonyme réussie :",
            userCredential.user.uid
        );

    })
    .catch((error) => {

        console.error(
            "Erreur d'authentification Firebase :",
            error.code,
            error.message
        );

        document
            .querySelectorAll(".like-btn")
            .forEach((button) => {

                button.disabled = true;
                button.textContent = "ERREUR AUTH";

            });

        alert(
            "Erreur de connexion Firebase : " +
            error.code
        );

    });


/* ==================================
   INITIALISATION DES LIKES
================================== */

function initializeLikes() {

    players.forEach((playerId) => {

        const playerLikesRef = ref(
            db,
            "likes/" + playerId
        );

        const button = document.querySelector(
            `button[data-player="${playerId}"]`
        );

        const counter = document.getElementById(
            playerId
        );

        if (!button || !counter) {

            console.error(
                "Bouton ou compteur introuvable pour :",
                playerId
            );

            return;

        }

        onValue(
            playerLikesRef,

            (snapshot) => {

                const likes = snapshot.val() || {};

                const likesCount =
                    Object.keys(likes).length;

                counter.textContent = likesCount;

                if (
                    currentUser &&
                    likes[currentUser.uid] === true
                ) {

                    button.classList.add("liked");
                    button.textContent = "LIKÉ";

                } else {

                    button.classList.remove("liked");
                    button.textContent = "LIKE";

                }

                button.disabled = false;

            },

            (error) => {

                console.error(
                    "Erreur de lecture des likes :",
                    error.code,
                    error.message
                );

                button.disabled = true;
                button.textContent = "ERREUR";

            }
        );

    });

}


/* ==================================
   AJOUT OU SUPPRESSION D'UN LIKE
================================== */

window.likePlayer = async function(button, playerId) {

    if (!currentUser) {

        console.error(
            "L'utilisateur n'est pas encore authentifié."
        );

        alert(
            "La connexion est encore en cours. Recharge la page."
        );

        return;

    }

    if (!players.includes(playerId)) {

        console.error(
            "Identifiant de joueur invalide :",
            playerId
        );

        return;

    }

    button.disabled = true;

    const userLikeRef = ref(
        db,
        "likes/" +
        playerId +
        "/" +
        currentUser.uid
    );

    try {

        if (button.classList.contains("liked")) {

            await remove(userLikeRef);

            console.log(
                "Like supprimé pour :",
                playerId
            );

        } else {

            await set(userLikeRef, true);

            console.log(
                "Like ajouté pour :",
                playerId
            );

        }

    } catch (error) {

        console.error(
            "Erreur lors du like :",
            error.code,
            error.message
        );

        alert(
            "Impossible d'enregistrer le like : " +
            error.code
        );

    } finally {

        button.disabled = false;

    }

};


/* ==================================
   MODAL IMAGE
================================== */

window.openModal = function(src) {

    const modal =
        document.getElementById("modal");

    const modalImg =
        document.getElementById("modalImg");

    modalImg.src = src;

    modal.classList.add("open");

};


window.closeModal = function() {

    const modal =
        document.getElementById("modal");

    modal.classList.remove("open");

};


document
    .getElementById("modal")
    .addEventListener("click", (event) => {

        if (event.target.id === "modal") {

            window.closeModal();

        }

    });


document.addEventListener(
    "keydown",
    (event) => {

        if (event.key === "Escape") {

            window.closeModal();

        }

    }
);


/* ==================================
   CATÉGORIES
================================== */

document
    .querySelectorAll(".category")
    .forEach((category) => {

        const button =
            category.querySelector(".category-title");

        const icon =
            button.querySelector("span");

        button.addEventListener(
            "click",
            () => {

                category.classList.toggle("open");

                icon.textContent =
                    category.classList.contains("open")
                        ? "-"
                        : "+";

            }
        );

    });

</script>

</body>
</html>
