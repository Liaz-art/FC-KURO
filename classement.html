<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FC KURO - Classement</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:#050008;
    color:white;
}

header{
    width:100%;
    height:90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 55px;
    background:rgba(0,0,0,.88);
    border-bottom:1px solid rgba(153,0,255,.4);
    box-shadow:0 0 25px rgba(123,0,255,.25);
}

.logo{
    color:white;
    text-decoration:none;
    font-size:26px;
    font-weight:900;
    letter-spacing:3px;
    text-shadow:0 0 15px #8a00ff;
}

nav{
    display:flex;
    gap:28px;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:13px;
    font-weight:bold;
    letter-spacing:1px;
    transition:.3s;
}

nav a:hover,
nav a.active{
    color:#b56cff;
    text-shadow:0 0 15px #9b00ff;
}

.page{
    min-height:calc(100vh - 90px);
    padding:60px 8% 100px;
    background:
        radial-gradient(circle at top right, rgba(120,0,255,.38), transparent 35%),
        radial-gradient(circle at bottom left, rgba(0,255,255,.13), transparent 35%),
        linear-gradient(135deg,#050008,#0b0015,#050008);
}

.title{
    text-align:center;
    font-size:55px;
    font-weight:900;
    letter-spacing:8px;
    text-shadow:
        0 0 15px #7b00ff,
        0 0 45px #7b00ff;
}

.subtitle{
    margin-top:15px;
    text-align:center;
    color:#c79aff;
    font-size:14px;
    letter-spacing:5px;
}

.loading{
    margin-top:80px;
    text-align:center;
    color:#c79aff;
    letter-spacing:3px;
    font-weight:bold;
}

.podium{
    min-height:590px;
    margin-top:75px;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:30px;
}

.podium-card{
    width:270px;
    display:flex;
    flex-direction:column;
    align-items:center;
    opacity:0;
    transform:translateY(35px);
    animation:appear .7s ease forwards;
}

.place-2{ animation-delay:.1s; }
.place-1{ animation-delay:.2s; }
.place-3{ animation-delay:.3s; }

@keyframes appear{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.crown{
    margin-bottom:12px;
    font-size:48px;
    color:#ffd32a;
    filter:drop-shadow(0 0 14px #ffbf00);
}

.player-card{
    width:100%;
    padding:22px 20px 24px;
    text-align:center;
    background:linear-gradient(145deg,rgba(18,0,30,.98),rgba(0,0,0,.98));
    border:1px solid rgba(138,0,255,.65);
    border-bottom:none;
    border-radius:18px 18px 0 0;
    box-shadow:0 0 25px rgba(123,0,255,.28);
}

.image-container{
    width:165px;
    height:220px;
    margin:0 auto;
    overflow:hidden;
    border-radius:14px;
    border:2px solid rgba(0,234,255,.65);
    box-shadow:0 0 22px rgba(0,234,255,.28);
}

.player-image{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:top;
    display:block;
}

.player-name{
    margin-top:18px;
    font-size:21px;
    font-weight:900;
    letter-spacing:2px;
}

.player-role{
    margin-top:7px;
    color:#c79aff;
    font-size:13px;
}

.like-count{
    margin-top:16px;
    display:inline-flex;
    padding:9px 16px;
    color:#00eaff;
    font-size:15px;
    font-weight:bold;
    border-radius:25px;
    border:1px solid rgba(0,234,255,.4);
    background:rgba(114,0,255,.22);
}

.place-number{
    width:72px;
    height:72px;
    margin-top:-4px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    border:4px solid #050008;
    font-size:31px;
    font-weight:900;
    z-index:2;
}

.place-1 .place-number{
    color:#241700;
    background:linear-gradient(145deg,#fff09a,#ffb800);
    box-shadow:0 0 28px rgba(255,184,0,.75);
}

.place-2 .place-number{
    color:#161616;
    background:linear-gradient(145deg,#fff,#9e9e9e);
    box-shadow:0 0 25px rgba(220,220,220,.55);
}

.place-3 .place-number{
    color:#2a1100;
    background:linear-gradient(145deg,#e7a46f,#a95016);
    box-shadow:0 0 25px rgba(201,103,40,.58);
}

.podium-base{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:28px;
    border-radius:0 0 12px 12px;
    font-weight:900;
    letter-spacing:3px;
}

.place-1 .podium-base{
    height:220px;
    background:linear-gradient(180deg,#9f6c00,#2c1700);
    border:1px solid #ffbf00;
}

.place-2 .podium-base{
    height:160px;
    background:linear-gradient(180deg,#676767,#171717);
    border:1px solid #bcbcbc;
}

.place-3 .podium-base{
    height:115px;
    background:linear-gradient(180deg,#8b451f,#2a1006);
    border:1px solid #b7652e;
}

.empty{
    width:100%;
    max-width:600px;
    margin:auto;
    padding:35px;
    text-align:center;
    color:#c79aff;
    border:1px solid rgba(138,0,255,.45);
    border-radius:15px;
    background:rgba(0,0,0,.55);
}

@media(max-width:950px){
    header{
        padding:0 20px;
    }

    nav{
        display:none;
    }

    .title{
        font-size:38px;
    }

    .podium{
        min-height:auto;
        flex-direction:column;
        align-items:center;
    }

    .podium-card{
        width:min(100%,320px);
    }

    .place-1{ order:1; }
    .place-2{ order:2; }
    .place-3{ order:3; }

    .place-1 .podium-base,
    .place-2 .podium-base,
    .place-3 .podium-base{
        height:90px;
    }
}
</style>
</head>

<body>

<header>
    <a href="index.html" class="logo">FC KURO</a>

    <nav>
        <a href="index.html">ACCUEIL</a>
        <a href="equipe.html">ÉQUIPE</a>
        <a href="joueurs.html">JOUEURS</a>
        <a href="classement.html" class="active">CLASSEMENT</a>
        <a href="club.html">CLUB</a>
    </nav>
</header>

<section class="page">
    <h1 class="title">CLASSEMENT</h1>
    <p class="subtitle">TOP 3 DES JOUEURS LES PLUS AIMÉS</p>

    <p class="loading" id="loading">CHARGEMENT DU CLASSEMENT...</p>

    <div class="podium" id="podium"></div>
</section>

<script type="module">
import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
    getDatabase,
    ref,
    onValue
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCCXkp9d-FYi94-OYQ1rAJIlAA_TyfVc-k",
    authDomain: "fc-kuro.firebaseapp.com",
    databaseURL: "https://fc-kuro-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "fc-kuro",
    storageBucket: "fc-kuro.firebasestorage.app",
    messagingSenderId: "420379848342",
    appId: "1:420379848342:web:c5c5f66ad096cdd827dcb7",
    measurementId: "G-Y2T0Q3BR6E"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/*
Ajoute tous tes joueurs ici.
L'identifiant doit être exactement le même que dans joueurs.html.
*/
const playersData = {
    liazLeka: {
        name: "LIAZ LEKA",
        role: "MC - Milieu Central",
        image: "liaz-leka.png"
    },

    koroSeiro: {
        name: "KORO SEIRO",
        role: "Milieu",
        image: "koro-seiro.png"
    }
};

const podium = document.getElementById("podium");
const loading = document.getElementById("loading");
const likesRef = ref(db, "likes");

onValue(
    likesRef,
    (snapshot) => {
        const likesData = snapshot.val() || {};

        const ranking = Object.keys(playersData).map((playerId) => {
            const playerLikes = likesData[playerId] || {};

            return {
                id: playerId,
                ...playersData[playerId],
                likes: Object.keys(playerLikes).length
            };
        });

        ranking.sort((a, b) => {
            if (b.likes !== a.likes) {
                return b.likes - a.likes;
            }

            return a.name.localeCompare(b.name);
        });

        loading.style.display = "none";
        displayPodium(ranking.slice(0, 3));
    },
    (error) => {
        console.error(
            "Erreur de chargement du classement :",
            error.code,
            error.message
        );

        loading.textContent = "IMPOSSIBLE DE CHARGER LE CLASSEMENT";
    }
);

function displayPodium(players) {
    podium.innerHTML = "";

    if (players.length === 0) {
        podium.innerHTML = `
            <div class="empty">
                Aucun joueur disponible dans le classement.
            </div>
        `;
        return;
    }

    const visualOrder = [
        players[1],
        players[0],
        players[2]
    ];

    visualOrder.forEach((player, index) => {
        if (!player) {
            return;
        }

        let place = 3;

        if (index === 0) {
            place = 2;
        }

        if (index === 1) {
            place = 1;
        }

        const card = document.createElement("div");
        card.className = `podium-card place-${place}`;

        const crown = place === 1
            ? `<div class="crown">♛</div>`
            : "";

        const likeText = player.likes > 1 ? "LIKES" : "LIKE";

        card.innerHTML = `
            ${crown}

            <div class="player-card">
                <div class="image-container">
                    <img
                        src="${player.image}"
                        alt="${player.name}"
                        class="player-image"
                    >
                </div>

                <h2 class="player-name">${player.name}</h2>
                <p class="player-role">${player.role}</p>

                <div class="like-count">
                    ${player.likes} ${likeText}
                </div>
            </div>

            <div class="place-number">${place}</div>

            <div class="podium-base">
                ${getPlaceText(place)}
            </div>
        `;

        podium.appendChild(card);
    });
}

function getPlaceText(place) {
    if (place === 1) {
        return "1ÈRE PLACE";
    }

    if (place === 2) {
        return "2ÈME PLACE";
    }

    return "3ÈME PLACE";
}
</script>

</body>
</html>
