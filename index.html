<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FC KURO</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    overflow:hidden;
}

.home{
    width:100vw;
    height:100vh;
    position:relative;
}

.home img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* LIENS INVISIBLES */
.click{
    position:absolute;
    display:block;
    background:transparent;
}

/* MENU DU HAUT */
.accueil{top:7%; left:25%; width:5%; height:4%;}
.equipe{top:7%; left:31%; width:5%; height:4%;}
.joueurs{top:7%; left:37%; width:6%; height:4%;}
.classement{top:7%; left:45%; width:8%; height:4%;}
.club{top:7%; left:54%; width:4%; height:4%;}
.actualites{top:7%; left:60%; width:8%; height:4%;}
.contact{top:7%; left:69%; width:6%; height:4%;}

/* BOUTONS CENTRE */
.btn-equipe{top:62%; left:36%; width:9%; height:6%;}
.btn-joueurs{top:62%; left:46%; width:9%; height:6%;}
.btn-classement{top:62%; left:56%; width:10%; height:6%;}

/* BILLETTERIE */
.billetterie{top:5%; left:86%; width:10%; height:6%;}

</style>
</head>

<body>

<section class="home">

    <img src="accueil.png" alt="FC Kuro">

    <!-- MENU INVISIBLE CLIQUABLE -->
    <a href="#" class="click accueil"></a>
    <a href="#" class="click equipe"></a>
    <a href="#" class="click joueurs"></a>
    <a href="#" class="click classement"></a>
    <a href="#" class="click club"></a>
    <a href="#" class="click actualites"></a>
    <a href="#" class="click contact"></a>

    <!-- BOUTONS CENTRE -->
    <a href="#" class="click btn-equipe"></a>
    <a href="#" class="click btn-joueurs"></a>
    <a href="#" class="click btn-classement"></a>

    <!-- BILLETTERIE -->
    <a href="#" class="click billetterie"></a>

</section>

</body>
</html>
